services:
  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: iccp_ai_opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
    volumes:
      - ai_opensearch_data:/usr/share/opensearch/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
    networks:
      - iccp-network

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.13.0
    container_name: iccp_ai_opensearch_dashboards
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    depends_on:
      opensearch:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - iccp-network

  mongo:
    image: mongo:7
    container_name: iccp_ai_mongo
    ports:
      - "27018:27017"
    volumes:
      - ai_mongo_data:/data/db
    restart: always
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - iccp-network

  redis:
    image: redis:7-alpine
    container_name: iccp_ai_redis
    ports:
      - "6381:6379"
    volumes:
      - ai_redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iccp-network

  iccp-be-ai:
    container_name: iccp-be-ai
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    env_file:
      - .env.dev
    environment:
      - MONGODB_URL=mongodb://mongo:27017
      - OPENSEARCH_URL=http://opensearch:9200
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    ports:
      - "${APP_PORT:-8001}:8001"
    volumes:
      - .:/app
      - /app/__pycache__
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - iccp-network

  celery-worker:
    container_name: iccp-ai-celery-worker
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    env_file:
      - .env.dev
    environment:
      - MONGODB_URL=mongodb://mongo:27017
      - OPENSEARCH_URL=http://opensearch:9200
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    command: >
      celery -A app.workers.celery_app.celery_app worker
      --loglevel=info
      --queues=ingest,analytics
      --concurrency=2
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - iccp-network

volumes:
  ai_redis_data:
  ai_mongo_data:
  ai_opensearch_data:

networks:
  iccp-network:
    external: true
    name: iccp-network
